spring:
  application:
    name: forum-backend
  profiles:
    default: local
  jackson:
    time-zone: UTC

server:
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

forum:
  security:
    jwt:
      secret: ${JWT_SECRET:}