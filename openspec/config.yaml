schema: spec-driven

context: |
  项目名称：Forum Backend

  项目目标：
  开发一个博客论坛 REST API 后端，支持用户、文章、分类、
  标签、评论、点赞和管理员审核。

  技术栈：
  - Java 17
  - Spring Boot 3.5.x
  - Maven 和 Maven Wrapper
  - Spring Web
  - Spring Security
  - Spring Data JPA
  - PostgreSQL
  - Flyway
  - JWT
  - Jakarta Bean Validation
  - Springdoc OpenAPI
  - Spring Boot Actuator
  - JUnit 5
  - Mockito
  - Testcontainers
  - Docker Compose

  架构方式：
  - 项目采用模块化单体架构
  - 顶层按照业务功能分包
  - 模块包括 common、auth、user、post、comment、reaction、moderation
  - 每个模块内部可以使用 controller、service、repository、entity、dto
  - 禁止在项目根包下建立全局 controller、service、repository、entity
  - 模块不得直接访问其他模块的内部 Repository
  - Controller 只负责 HTTP 适配、参数校验和响应转换
  - 核心业务逻辑必须位于 Service 或领域对象中
  - JPA Entity 不得直接作为公开 API 响应

  数据库规则：
  - 数据库使用 PostgreSQL
  - 所有数据库变化必须通过 Flyway Migration
  - 禁止依赖 Hibernate 自动修改生产数据库结构
  - 邮箱、用户名和点赞等唯一性必须使用数据库约束
  - 文章使用乐观锁防止并发覆盖
  - 核心业务数据使用状态字段或软删除
  - 时间统一使用 UTC
  - 主键使用 UUID

  API 规则：
  - API 前缀统一为 /api/v1
  - 使用 JSON
  - 所有输入使用 Jakarta Bean Validation
  - 错误响应采用 ProblemDetail 风格
  - 每个业务异常必须有稳定错误码
  - 分页默认 20 条，最大 100 条
  - 不直接返回 JPA Entity

  安全规则：
  - 使用 Spring Security
  - 默认拒绝访问
  - Access Token 有效期 30 分钟
  - Refresh Token 有效期 7 天
  - Refresh Token 刷新时轮换
  - 数据库只保存 Refresh Token 哈希
  - 密码使用 BCrypt
  - 禁止在日志中记录密码和完整 Token
  - JWT 密钥从环境变量读取

  测试规则：
  - 使用 JUnit 5 和 Mockito
  - Repository 和数据库集成测试使用 PostgreSQL Testcontainers
  - 不使用 H2 替代 PostgreSQL 集成测试
  - 权限、状态转换、幂等性和并发冲突必须有测试
  - Bug 修复必须包含回归测试
  - 未通过测试的任务不得标记为完成

  文档规则：
  - proposal、specs、design 和 tasks 使用简体中文
  - Java 标识符、API 路径、JSON 字段、SQL 字段和错误码保留英文
  - 不允许为了生成文档而虚构现有代码或依赖
  - 不确定内容必须明确标记，不得静默假设

rules:
  proposal:
    - 必须说明问题、目标、范围和非目标
    - 必须说明受影响的业务领域
    - 必须列出主要风险和回滚思路
    - 不得过早写具体类名和数据库字段
    - 必须明确本次不实现的功能

  specs:
    - 所有需求必须是可观察、可测试的系统行为
    - 每条需求必须至少包含一个场景
    - 场景使用“当、则、并且”描述
    - 必须覆盖权限失败、数据不存在、状态冲突和参数错误
    - 必须描述幂等、并发和分页行为
    - 禁止在规格中规定具体 Controller 或 Repository 类名

  design:
    - 必须说明模块边界和依赖方向
    - 必须列出 API、数据模型、数据库约束和索引
    - 必须说明认证、授权、事务和并发策略
    - 必须说明异常处理和错误码
    - 必须提供测试策略
    - 必须说明被放弃的备选方案
    - 禁止引入当前需求不需要的中间件

  tasks:
    - 必须按照依赖顺序拆分任务
    - 每个任务只能有一个主要目标
    - 每个任务应包含明确的修改范围和验证方式
    - 测试任务不得全部集中在最后
    - 每个业务阶段完成后必须运行测试
    - 未实际完成和验证的任务不得勾选